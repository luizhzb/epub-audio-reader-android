name: Build APK + Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download TTS Model
        run: |
          echo "Downloading TTS model from official Sherpa-ONNX release..."
          python3 download_model.py
          echo ""
          echo "=== Model files ==="
          find core/tts/src/main/assets/ -type f | head -20
          echo ""
          echo "Total size:"
          du -sh core/tts/src/main/assets/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v0.4.0
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release v0.4.0
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v0.4.0
          name: "v0.4.0 - TTS Refactor (Official API)"
          body: |
            ## EPUB Audio Reader v0.4.0 - TTS Refatorado

            ### Refatoracao completa do TTS baseado no codigo oficial do Sherpa-ONNX
            - Usa `OfflineTts(assetManager, config)` → `newFromAsset()` para carregar modelo diretamente do APK
            - Usa `generateWithConfigAndCallback()` com callback JNI para playback
            - AudioTrack com `MODE_STREAM` + `ENCODING_PCM_FLOAT` (igual ao oficial)
            - Modelo: **vits-piper-en_US-amy-low** (exemplo oficial #2)

            ### O que mudou
            - Eliminada copia desnecessaria do modelo para filesystem
            - Playback via callback JNI (nao carrega tudo em memoria)
            - Modelo oficial do Sherpa-ONNX (testado e validado)
            - Sem download HTTP — 100%% offline

            ### Como usar
            1. Instale o APK
            2. Abra o app → Tela de teste TTS
            3. Toque "Preparar Modelo" (copia espeak-ng-data na primeira vez)
            4. Toque "Testar Voz"

            ### Requisitos
            - Android 8.0+ (API 26)
            - **100%% offline**
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
