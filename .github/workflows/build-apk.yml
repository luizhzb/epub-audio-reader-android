name: Build APK + Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download TTS Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Downloading TTS model from HuggingFace..."
          python3 download_model.py --token "$HF_TOKEN"
          echo ""
          echo "=== Model files ==="
          ls -lh core/tts/src/main/assets/tts_model/
          echo ""
          echo "Total size:"
          du -sh core/tts/src/main/assets/tts_model/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v0.3.0
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v0.3.0
          name: "v0.3.0 - TTS Integrado + Correções"
          body: |
            ## EPUB Audio Reader v0.3.0

            ### TTS Offline Integrado
            - TTS com Sherpa-ONNX 100% offline
            - Modelo empacotado no APK (sem download)
            - Leitura por parágrafo na tela de EPUB
            - Controles: play, pause, próximo, anterior

            ### Correções de Crash
            - AudioTrack com MODE_STREAM (estável)
            - PCM com ENCODING_PCM_FLOAT
            - Sincronização com callback onComplete
            - Error handling completo com snackbar
            - Logging detalhado para debug

            ### Melhorias
            - Progresso de cópia por bytes (não por arquivo)
            - Verificação de integridade do modelo (.onnx + .json)
            - ViewModel init corrigido (corrotinas separadas)
            - Auto-limpeza de arquivos parciais em erro

            ### Como usar
            1. Instale o APK (~130 MB)
            2. Abra um EPUB
            3. Toque no ícone 🔊 (canto inferior direito)
            4. O app copia o modelo (primeira vez, ~5s)
            5. A leitura começa automaticamente

            ### Requisitos
            - Android 8.0+ (API 26)
            - **100% offline, zero configuração**
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
