name: Build APK + Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download TTS Model
        run: |
          echo "Downloading TTS model from official Sherpa-ONNX release..."
          python3 download_model.py
          echo ""
          echo "=== Model files ==="
          find core/tts/src/main/assets/ -type f | head -20
          echo ""
          echo "Total size:"
          du -sh core/tts/src/main/assets/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: |
            core/data/build/reports/tests/
            app/build/reports/tests/

      - name: Delete old release
        uses: dev-drprasad/delete-tag-and-release@v1.0
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v0.5.1
          delete_release: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Create Release v0.5.1
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v0.5.1
          name: "v0.5.1 - EPUB Audio Reader"
          body: |
            ## EPUB Audio Reader v0.5.1

            ### Funcionalidades
            - Leitura de EPUB com biblioteca e capítulos
            - TTS offline com Sherpa-ONNX
            - Voz em português do Brasil (pt-BR)
            - Leitura por parágrafo com segmentação inteligente
            - Prefetch de segmentos para playback contínuo

            ### Requisitos
            - Android 8.0+ (API 26)
            - **100%% offline**
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
