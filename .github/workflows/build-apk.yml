name: Build APK + Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download TTS Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Downloading TTS model from HuggingFace..."
          python3 download_model.py --token "$HF_TOKEN"
          echo ""
          echo "=== Model files ==="
          ls -lh core/tts/src/main/assets/tts_model/
          echo ""
          echo "Total size:"
          du -sh core/tts/src/main/assets/tts_model/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.9

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Build Debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v0.2.1-fase2-modelo
          name: "Fase 2 - Kokoro Offline TTS (Modelo Incluso)"
          body: |
            ## EPUB Audio Reader - Fase 2 (com modelo TTS)

            ### O que ha de novo
            - **Modelo TTS empacotado no APK** — 100% offline, sem download!
            - TTS Offline com Sherpa-ONNX
            - Tela de teste "Testar Voz"
            - Sintese de voz local

            ### Como usar
            1. Instale o APK (~30 MB)
            2. Abra o app
            3. Toque no icone de voz na barra superior
            4. Toque "Preparar Modelo" (copia interna, rapido)
            5. Digite um texto e toque "Testar Voz"

            ### Requisitos
            - Android 8.0+ (API 26)
            - **Zero configuracao, zero download, 100% offline**
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
