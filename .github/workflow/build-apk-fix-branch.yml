name: Build APK + Release (fix branch)

on:
  push:
    branches: [ fix/147-bugs-correction ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download TTS Model
        run: |
          echo "Downloading TTS model..."
          python3 download_model.py
          find core/tts/src/main/assets/ -type f | head -20
          du -sh core/tts/src/main/assets/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Verify APK
        run: |
          echo "=== APK Output ==="
          ls -la app/build/outputs/apk/release/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk

      - name: Create or Update Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: v0.5.2
          name: "v0.5.2 - EPUB Audio Reader (Crash Fixes)"
          body: |
            ## EPUB Audio Reader v0.5.2 - Correcoes de Crash
            ### Correcoes de estabilidade
            - Pre-carregamento automatico do modelo TTS na splash screen
            - Botao "Carregar Modelo" na tela de leitura para diagnostico
            - Card de status do modelo TTS com progresso visual
            - FAB desabilitado quando modelo nao esta pronto
            - Fallback PCM_FLOAT -> PCM_16BIT para dispositivos sem suporte
            - Thread.sleep() substituido por delay() em coroutines
            - Sanitizacao de texto antes de passar ao JNI
            - Try/catch completo em playSegment e pipeline
            - Verificacao de AudioTrack antes de iniciar playback
            - Snackbar com acao "Tentar" quando modelo em erro
            ### Funcionalidades
            - Leitura de EPUB com biblioteca e capitulos
            - TTS offline com Sherpa-ONNX
            - Voz em portugues do Brasil (pt-BR)
            - Leitura por paragrafo com segmentacao inteligente
            - Scroll automatico para paragrafo sendo lido
            - Avanco automatico entre capitulos
            ### Requisitos
            - Android 8.0+ (API 26)
            - **100% offline**
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
